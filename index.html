<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: http:; script-src 'self'"
    />
    <title>Relay</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0b0d12;
        transition: opacity 0.6s ease-out;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash .bolt {
        width: 48px;
        height: 48px;
        color: #818cf8;
        animation: splash-pulse 1.5s ease-in-out infinite;
      }
      #splash .bolt svg {
        width: 100%;
        height: 100%;
      }
      #splash .title {
        margin-top: 20px;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: white;
        background: linear-gradient(90deg, #6366f1, #a5b4fc, #6366f1);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: splash-shimmer 2s linear infinite;
      }
      #splash .sub {
        margin-top: 8px;
        font-size: 13px;
        color: rgba(255,255,255,0.35);
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 0.7; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      @keyframes splash-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('relay:theme');
          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
            document.documentElement.style.colorScheme = 'light';
            document.getElementById('splash').style.background = '#f4f5f9';
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="splash">
      <div class="bolt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2 4 14h7l-1 8 9-12h-7z" />
        </svg>
      </div>
      <div class="title">Relay</div>
      <div class="sub">Local-first device hub</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
